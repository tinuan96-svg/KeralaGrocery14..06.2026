# Updated: July 02, 2026 - Fixed Guideline 2.3.10 (Google Play references)
workflows:
  ios-release:
    name: Kerala Grocery iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    # Removed automatic integration to allow manual UI signing
    environment:
      groups:
        - supabase
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.keralagrocery.app
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: "com.keralagrocery.app"
        TEAM_ID: "PDZ7779Q9J"
      node: 22
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install plist
      - name: Build Next.js project
        script: |
          export NEXT_TELEMETRY_DISABLED=1
          npm run build
          mkdir -p out
          echo "<html><body>Kerala Grocery Remote Wrapper</body></html>" > out/index.html
      - name: Sync Capacitor and Apply Fixes
        script: |
          npx cap sync ios
          node scripts/patch-info-plist.js || true
          printf "platform :ios, '15.0'\nuse_frameworks! :linkage => :static\n\ninstall! 'cocoapods', :disable_input_output_paths => true\n\ntarget 'App' do\nend\n\npost_install do |installer|\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n      config.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'\n      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'\n    end\n  end\nend\n" > ios/App/Podfile
          cd ios/App
          rm -rf Pods Podfile.lock
          pod install
          cd ../..
          node scripts/generate-ios-icons.js
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $((400 + $BUILD_NUMBER))
      - name: Build iOS IPA
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "DEVELOPMENT_TEAM=$TEAM_ID ENABLE_USER_SCRIPT_SANDBOXING=NO" \
            --archive-xcargs "COMPILER_INDEX_STORE_ENABLE=NO"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        # Use token-based publishing to avoid integration error
        auth: integration 
        submit_to_testflight: false
        submit_to_app_store: false

  simulator-workflow:
    name: Kerala Grocery iOS Simulator
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 22
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Next.js project
        script: |
          export NEXT_TELEMETRY_DISABLED=1
          npm run build
          mkdir -p out
          echo "<html><body>Kerala Grocery Simulator</body></html>" > out/index.html
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Build for simulator
        script: |
          # Fresh pod install for simulator
          cd ios/App && pod install && cd ../..
          xcodebuild build \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO
    artifacts:
      - /Users/builder/Library/Developer/Xcode/DerivedData/**/*.app

  android-debug:
    name: Kerala Grocery Android Debug
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: 22
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Next.js project
        script: |
          export NEXT_TELEMETRY_DISABLED=1
          npm run build
          mkdir -p out
          echo "<html><body>Kerala Grocery Android</body></html>" > out/index.html
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "android/local.properties"
      - name: Build Android
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
