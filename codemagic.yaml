workflows:
  ios-release:
    name: Kerala Grocery iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    # Removed explicit integrations block to use default connected account
    environment:
      groups:
        - supabase
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: "com.keralagrocery.app"
      node: 18
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'KeralaGrocery.com'
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Next.js project
        script: |
          export NEXT_TELEMETRY_DISABLED=1
          npx next build
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: Set build number
        script: |
          cd ios/App
          # Start from 2 to clear the rejected build 1
          agvtool new-version -all $((2 + $BUILD_NUMBER))
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Build iOS IPA
        script: |
          keychain initialize
          # Fetch signing files using the default connected App Store Connect account
          app-store-connect fetch-signing-files "$APP_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "-allowProvisioningUpdates"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
