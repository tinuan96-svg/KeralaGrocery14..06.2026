workflows:
  ios-release:
    name: Kerala Grocery iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - supabase
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.keralagrocery.app
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: "com.keralagrocery.app"
        TEAM_ID: "PDZ7779Q9J"
      node: 22
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Next.js project
        script: |
          export NEXT_TELEMETRY_DISABLED=1
          npm run build
          mkdir -p out
          echo "<html><body>Kerala Grocery Remote Wrapper</body></html>" > out/index.html
      - name: Sync Capacitor and Apply Fixes
        script: |
          # 1. Ensure the ios platform exists
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          
          # 2. Sync Capacitor (populates the ios folder)
          npx cap sync ios
          
          # 3. Apply Info.plist and Podfile modifications
          node scripts/patch-info-plist.js || true
          
          # Force Static Linkage and fix sandbox in Podfile (Fixes Launch Crash)
          cd ios/App
          sed -i '' 's/use_frameworks!/use_frameworks! :linkage => :static/g' Podfile
          
          # Add CocoaPods fix for duplicate framework paths
          if ! grep -q "disable_input_output_paths" Podfile; then
            echo "install! 'cocoapods', :disable_input_output_paths => true" | cat - Podfile > temp && mv temp Podfile
          fi
          
          # 4. Clean and Install Pods (This creates App.xcworkspace)
          rm -rf Pods
          rm -rf Podfile.lock
          pod install
          cd ../..
          
          # 5. Generate Icons (Alpha removal)
          node scripts/generate-ios-icons.js
          
          # 6. Verify workspace existence
          if [ ! -d "ios/App/App.xcworkspace" ]; then
            echo "Error: ios/App/App.xcworkspace was not created by pod install."
            exit 1
          fi
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $((120 + $BUILD_NUMBER))
      - name: Build iOS IPA
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles --archive-method app-store
          
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "DEVELOPMENT_TEAM=$TEAM_ID ENABLE_USER_SCRIPT_SANDBOXING=NO" \
            --archive-xcargs "COMPILER_INDEX_STORE_ENABLE=NO SKIP_INSTALL=NO"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
