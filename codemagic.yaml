workflows:
  ios-release:
    name: Kerala Grocery iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - supabase
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: "com.keralagrocery.app"
      node: 22
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'KeralaGrocery.com'
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Next.js project
        script: |
          export NEXT_TELEMETRY_DISABLED=1
          npm run build
          mkdir -p out
          echo "<html><body>Kerala Grocery Remote Wrapper</body></html>" > out/index.html
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $((2 + $BUILD_NUMBER))
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Build iOS IPA
        script: |
          keychain initialize
          keychain add-certificates
          
          # Automatically find and use the provisioning profile you uploaded to the UI
          xcode-project use-profiles
          
          # Fixed build command and added flag to resolve duplicate framework error
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-xcargs "EXCLUDED_SOURCE_FILE_NAMES=Capacitor.framework Cordova.framework" \
            --archive-flags "ENABLE_USER_SCRIPT_SANDBOXING=NO"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
