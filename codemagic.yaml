workflows:
  ios-release:
    name: Kerala Grocery iOS Release
    # Linked integration for App Store Connect
    integrations:
      app_store_connect: Codemagic
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - supabase
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: "com.keralagrocery.app"
      node: 22
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'KeralaGrocery.com'
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Next.js project
        script: |
          # Skip type checking and linting to ensure build succeeds
          export NEXT_TELEMETRY_DISABLED=1
          # Clear previous builds
          rm -rf .next out
          # Perform static export build
          npm run build
      - name: Sync Capacitor
        script: |
          # Ensure Capacitor syncs the freshly generated 'out' folder
          npx cap sync ios
      - name: Set build number
        script: |
          cd ios/App
          # Start from 2 to ensure it's higher than the rejected build
          agvtool new-version -all $((2 + $BUILD_NUMBER))
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Build iOS IPA
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$APP_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "-allowProvisioningUpdates"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
