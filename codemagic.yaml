workflows:
  ios-release:
    name: Kerala Grocery iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - supabase
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.keralagrocery.app
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: "com.keralagrocery.app"
        TEAM_ID: "PDZ7779Q9J"
      node: 22
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Next.js project
        script: |
          export NEXT_TELEMETRY_DISABLED=1
          npm run build
          mkdir -p out
          echo "<html><body>Kerala Grocery Remote Wrapper</body></html>" > out/index.html
      - name: Sync Capacitor and Patch Configs
        script: |
          # 1. Sync Capacitor (generates the default Podfile)
          npx cap sync ios
          
          # 2. Patch Info.plist (ignore errors if script has environment issues)
          node scripts/patch-info-plist.js || true
          
          # 3. Patch Podfile for Static Linkage (Fixes the Launch Crash)
          # We use sed to change the linkage and add the sandbox fix
          sed -i '' 's/use_frameworks!/use_frameworks! :linkage => :static/g' ios/App/Podfile
          
          # Add the CocoaPods fix for duplicate framework paths
          echo "install! 'cocoapods', :disable_input_output_paths => true" >> ios/App/Podfile
          
          # 4. Generate Flattened App Icons (No alpha channel)
          node scripts/generate-ios-icons.js
          
          # 5. Force copy icons into Xcode assets
          mkdir -p ios/App/App/Assets.xcassets/AppIcon.appiconset
          cp -af ios-assets/AppIcon.appiconset/* ios/App/App/Assets.xcassets/AppIcon.appiconset/
          
          # 6. Install Pods
          cd ios/App
          pod install
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $((120 + $BUILD_NUMBER))
      - name: Build iOS IPA
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles --archive-method app-store
          
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "DEVELOPMENT_TEAM=$TEAM_ID ENABLE_USER_SCRIPT_SANDBOXING=NO" \
            --archive-xcargs "COMPILER_INDEX_STORE_ENABLE=NO SKIP_INSTALL=NO"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
