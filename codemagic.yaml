workflows:
  ios-release:
    name: Kerala Grocery iOS Release
    integrations:
      app_store_connect: Codemagic
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - supabase
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: "com.keralagrocery.app"
        TEAM_ID: "PDZ7779Q9J"
      node: 22
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'KeralaGrocery.com'
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Next.js project
        script: |
          export NEXT_TELEMETRY_DISABLED=1
          rm -rf .next out
          npm run build
      - name: Sync Capacitor
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
            node scripts/patch-info-plist.js
          fi
          cp ios-config/Podfile.patch ios/App/Podfile
          npx cap sync ios
          cd ios/App && pod install
      - name: Set build number
        script: |
          cd ios/App
          NEW_BUILD_NUMBER=$((2 + $BUILD_NUMBER))
          agvtool new-version -all $NEW_BUILD_NUMBER
          git config --global user.email "builder@codemagic.io"
          git config --global user.name "Codemagic Builder"
          git remote set-url origin git@github.com:tinuan96-svg/KeralaGrocery14..06.2026.git
          git add .
          git commit -m "chore: bump build number to $NEW_BUILD_NUMBER [skip ci]"
          git push origin KeralaGrocery.com || echo "Push failed, but continuing..."
      - name: Build iOS IPA
        script: |
          keychain initialize
          # 1. Fetch and create signing files specifically for App Store
          app-store-connect fetch-signing-files "$APP_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          
          # 2. Apply profiles for App Store (Forcing the method)
          xcode-project use-profiles --archive-method app-store
          
          # 3. Build IPA with explicit flags
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags="ENABLE_USER_SCRIPT_SANDBOXING=NO DEVELOPMENT_TEAM=$TEAM_ID"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-release:
    name: Kerala Grocery Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - supabase
      vars:
        PACKAGE_NAME: "com.keralagrocery.app"
      node: 22
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'KeralaGrocery.com'
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Next.js project
        script: |
          export NEXT_TELEMETRY_DISABLED=1
          rm -rf .next out
          npm run build
      - name: Sync Capacitor
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android
      - name: Build Android Release
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab
