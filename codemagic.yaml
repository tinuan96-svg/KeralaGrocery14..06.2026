workflows:
  ios-release:
    name: Kerala Grocery iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - supabase
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.keralagrocery.app
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: "com.keralagrocery.app"
        TEAM_ID: "PDZ7779Q9J"
      node: 22
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Next.js project
        script: |
          export NEXT_TELEMETRY_DISABLED=1
          npm run build
          mkdir -p out
          echo "<html><body>Kerala Grocery Remote Wrapper</body></html>" > out/index.html
      - name: Sync Capacitor and Apply Fixes
        script: |
          # 1. Sync Capacitor (generates the native project and default Podfile)
          npx cap sync ios
          
          # 2. Patch Info.plist
          node scripts/patch-info-plist.js || true
          
          # 3. Patch Podfile via sed (Surgical Edit)
          # We don't overwrite the file, we only change the linkage and add the sandbox fix
          # to the file Capacitor just generated.
          cd ios/App
          
          # Set static linkage (REQUIRED to fix launch crash)
          sed -i '' 's/use_frameworks!/use_frameworks! :linkage => :static/g' Podfile
          
          # Add the CocoaPods fix for duplicate framework paths at the top
          echo "install! 'cocoapods', :disable_input_output_paths => true" | cat - Podfile > temp && mv temp Podfile
          
          # Ensure sandbox is disabled in the post_install block
          # This replaces the default post_install or appends to it
          echo "
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
              end
            end
          end" >> Podfile
          
          # 4. Clean and Install Pods
          rm -rf Pods
          rm -rf Podfile.lock
          pod install
          cd ../..
          
          # 5. Generate Flattened App Icons (No alpha channel)
          node scripts/generate-ios-icons.js
          
          # 6. Force copy icons into Xcode assets
          mkdir -p ios/App/App/Assets.xcassets/AppIcon.appiconset
          cp -af ios-assets/AppIcon.appiconset/* ios/App/App/Assets.xcassets/AppIcon.appiconset/
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $((120 + $BUILD_NUMBER))
      - name: Build iOS IPA
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles --archive-method app-store
          
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "DEVELOPMENT_TEAM=$TEAM_ID ENABLE_USER_SCRIPT_SANDBOXING=NO" \
            --archive-xcargs "COMPILER_INDEX_STORE_ENABLE=NO SKIP_INSTALL=NO"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
