workflows:
  ios-release:
    name: Kerala Grocery iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - supabase
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.keralagrocery.app
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: "com.keralagrocery.app"
        TEAM_ID: "PDZ7779Q9J"
      node: 22
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install plist
      - name: Build Next.js project
        script: |
          export NEXT_TELEMETRY_DISABLED=1
          npm run build
          mkdir -p out
          echo "<html><body>Kerala Grocery Remote Wrapper</body></html>" > out/index.html
      - name: Sync Capacitor and Apply Fixes
        script: |
          npx cap sync ios
          
          node scripts/patch-info-plist.js || true
          
          # Write a clean Podfile directly to avoid multiple post_install errors
          # This version forces static linkage to resolve the launch crash.
          cat > ios/App/Podfile <<'EOF'
require_relative '../../node_modules/@capacitor/ios/scripts/pods_helpers'

platform :ios, '15.0'
use_frameworks! :linkage => :static

install! 'cocoapods', :disable_input_output_paths => true

target 'App' do
  capacitor_pods
end

post_install do |installer|
  installer.pods_project.targets.each do |target|
    target.build_configurations.each do |config|
      config.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'
      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
    end
  end
end
EOF

          cd ios/App
          rm -rf Pods Podfile.lock
          pod install
          cd ../..
          
          node scripts/generate-ios-icons.js
          
          if [ ! -d "ios/App/App.xcworkspace" ]; then
            echo "ERROR: App.xcworkspace not found."
            exit 1
          fi
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $((120 + $BUILD_NUMBER))
      - name: Build iOS IPA
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles --archive-method app-store
          
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "DEVELOPMENT_TEAM=$TEAM_ID ENABLE_USER_SCRIPT_SANDBOXING=NO" \
            --archive-xcargs "COMPILER_INDEX_STORE_ENABLE=NO SKIP_INSTALL=NO"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
