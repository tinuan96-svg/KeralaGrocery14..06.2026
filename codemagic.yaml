workflows:
  ios-release:
    name: Kerala Grocery iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - supabase
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.keralagrocery.app
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_ID: "com.keralagrocery.app"
        TEAM_ID: "PDZ7779Q9J"
      node: 22
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install plist
      - name: Build Next.js project
        script: |
          export NEXT_TELEMETRY_DISABLED=1
          npm run build
          mkdir -p out
          echo "<html><body>Kerala Grocery Remote Wrapper</body></html>" > out/index.html
      - name: Sync Capacitor and Apply Fixes
        script: |
          # 1. Sync Capacitor
          npx cap sync ios
          
          # 2. Patch Info.plist
          node scripts/patch-info-plist.js || true
          
          # 3. Generate Flattened App Icons and Contents.json (CRITICAL for KG Logo)
          node scripts/generate-ios-icons.js
          
          # 4. Patch Podfile (Fixes Launch Crash)
          cd ios/App
          printf "platform :ios, '15.0'\nuse_frameworks! :linkage => :static\n\ninstall! 'cocoapods', :disable_input_output_paths => true\n\ntarget 'App' do\nend\n\npost_install do |installer|\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n      config.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'\n      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'\n    end\n  end\nend\n" > Podfile

          rm -rf Pods Podfile.lock
          pod install
          cd ../..
          
          if [ ! -d "ios/App/App.xcworkspace" ]; then
            echo "ERROR: App.xcworkspace not found."
            exit 1
          fi
      - name: Set build number
        script: |
          cd ios/App
          # Jumping to 200 to clear any cached states on Apple's servers
          agvtool new-version -all $((200 + $BUILD_NUMBER))
      - name: Build iOS IPA
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles --archive-method app-store
          
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "DEVELOPMENT_TEAM=$TEAM_ID ENABLE_USER_SCRIPT_SANDBOXING=NO" \
            --archive-xcargs "COMPILER_INDEX_STORE_ENABLE=NO SKIP_INSTALL=NO"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        # Set to false to avoid "Beta Description" error; build will still upload
        submit_to_testflight: false
        submit_to_app_store: false
